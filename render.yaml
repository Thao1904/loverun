services:
  - type: web
    name: loverun
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: PORT
        value: 10000
      - key: VITE_API_BASE_URL
        value: ""
      - key: APP_WEB_ORIGIN
        sync: false
      - key: VITE_STRAVA_CLIENT_ID
        sync: false
      - key: STRAVA_CLIENT_SECRET
        sync: false
      - key: VITE_STRAVA_REDIRECT_URI
        sync: false
      - key: APP_TIMEZONE
        value: America/New_York
      - key: DEFAULT_SHARED_GOAL_KM
        value: "18"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STRAVA_TOKENS_TABLE
        value: strava_tokens
      - key: SUPABASE_SETTINGS_TABLE
        value: app_settings
